networks:
  jiraclaw_network:
    external: true

services:
  jiraclaw:
    image: jiraclaw:${APP_VERSION}
    container_name: jiraclaw
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - jiraclaw_network
    restart: always

  inngest:
    image: inngest/inngest:latest
    container_name: inngest
    command: ["inngest", "dev", "-u", "http://host.docker.internal:3000/api/inngest"]
    ports:
      - "8288:8288"
    networks:
      - jiraclaw_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  jiraclaw_redis:
    image: redis:7-alpine
    container_name: jiraclaw_redis
    ports:
      - "6379:6379"
    networks:
      - jiraclaw_network
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
