# Only for development and testing environments.
# For production, use a managed database service or a separate database container with proper security and backup strategies.
services:
  # Database (Postgres)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Queue and background worker (Inngest)
  inngest:
    image: inngest/inngest:latest
    restart: always
    command: >
      inngest dev
      -u http://host.docker.internal:3000/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      - "host.docker.internal:host-gateway"

