{{- if .Values.database.enabled }}
{{- if not .Values.database.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jiraclaw-chart.fullname" . }}-postgres
  labels:
    {{- include "jiraclaw-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  postgres-password: {{ .Values.database.password | default (randAlphaNum 16) | quote }}
  postgres-database: {{ .Values.database.database | quote }}
  postgres-user: {{ .Values.database.user | quote }}
  postgres-url: "postgresql://{{ .Values.database.user }}:{{ .Values.database.password | default (randAlphaNum 16) | urlquery }}@{{ include "jiraclaw-chart.fullname" . }}-postgres:{{ .Values.database.port }}/{{ .Values.database.database }}"
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jiraclaw-chart.fullname" . }}-postgres
  labels:
    {{- include "jiraclaw-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  ports:
    - port: {{ .Values.database.port }}
      targetPort: {{ .Values.database.port }}
      protocol: TCP
      name: postgres
  selector:
    {{- include "jiraclaw-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jiraclaw-chart.fullname" . }}-postgres
  labels:
    {{- include "jiraclaw-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "jiraclaw-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "jiraclaw-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.database.port }}
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: postgres-data
          {{- if .Values.database.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "jiraclaw-chart.fullname" . }}-postgres-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.database.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "jiraclaw-chart.fullname" . }}-postgres-data
  labels:
    {{- include "jiraclaw-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.database.persistence.storageClass }}
  storageClassName: {{ .Values.database.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.database.persistence.size }}
---
{{- end }}
{{- end }}
