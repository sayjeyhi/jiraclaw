{{- if .Values.worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jiraclaw-chart.fullname" . }}-worker
  labels:
    {{- include "jiraclaw-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "jiraclaw-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "jiraclaw-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "worker"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            {{- if .Values.database.enabled }}
            - name: DATABASE_HOST
              value: {{ include "jiraclaw-chart.fullname" . }}-postgres
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-postgres" (include "jiraclaw-chart.fullname" .)) }}
                  key: postgres-url
            {{- end }}
            {{- if .Values.rabbitmq.enabled }}
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.existingSecret | default (printf "%s-rabbitmq" (include "jiraclaw-chart.fullname" .)) }}
                  key: RABBITMQ_URL
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: REPOS_PATH
              value: /repos
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: repos
              mountPath: /repos
            - name: tmp
              mountPath: /tmp
            - name: pnpm-home
              mountPath: /pnpm
            - name: home-node
              mountPath: /home/node
      volumes:
        - name: repos
          {{- if .Values.worker.repos.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "jiraclaw-chart.fullname" . }}-worker-repos
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: pnpm-home
          emptyDir: {}
        - name: home-node
          emptyDir: {}
{{- end }}
